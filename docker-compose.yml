version: '3.8'

services:
  # PostgreSQL - Main transactional database
  postgres:
    image: postgres:15-alpine
    container_name: suberfood-postgres
    environment:
      POSTGRES_USER: suberfood
      POSTGRES_PASSWORD: dev_password_change_in_prod
      POSTGRES_DB: suberfood_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init-scripts/postgres:/docker-entrypoint-initdb.d
    networks:
      - suberfood-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suberfood"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB - Document storage
  mongodb:
    image: mongo:7
    container_name: suberfood-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: suberfood
      MONGO_INITDB_ROOT_PASSWORD: dev_password_change_in_prod
      MONGO_INITDB_DATABASE: suberfood_dev
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - suberfood-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Caching and session storage
  redis:
    image: redis:7-alpine
    container_name: suberfood-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - suberfood-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka - Event streaming
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: suberfood-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - suberfood-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: suberfood-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - suberfood-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Elasticsearch - Search and logging
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: suberfood-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - suberfood-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO - S3-compatible object storage (for local dev)
  minio:
    image: minio/minio:latest
    container_name: suberfood-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: suberfood
      MINIO_ROOT_PASSWORD: dev_password_change_in_prod
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - suberfood-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # pgAdmin - PostgreSQL GUI (development only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: suberfood-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@suberfood.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - suberfood-network
    depends_on:
      - postgres

  # Mongo Express - MongoDB GUI (development only)
  mongo-express:
    image: mongo-express:latest
    container_name: suberfood-mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: suberfood
      ME_CONFIG_MONGODB_ADMINPASSWORD: dev_password_change_in_prod
      ME_CONFIG_MONGODB_URL: mongodb://suberfood:dev_password_change_in_prod@mongodb:27017/
    ports:
      - "8081:8081"
    networks:
      - suberfood-network
    depends_on:
      - mongodb

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  elasticsearch_data:
  minio_data:

networks:
  suberfood-network:
    driver: bridge
